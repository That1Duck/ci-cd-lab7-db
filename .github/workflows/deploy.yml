name: Databricks Bundle Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # VM from github
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      
      - name: Validate bundle
        run: databricks bundle validate --target test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_my_warehouse_id: ${{ secrets.SQL_WAREHOUSE_ID }}
      
      - name: Deploy Bundle to TEST
        run: |
          databricks bundle deploy --target test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_my_warehouse_id: ${{ secrets.SQL_WAREHOUSE_ID }}

      - name: Run pipeline
        run: databricks bundle run --target test mazhara_pipeline --refresh-all
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_my_warehouse_id: ${{ secrets.SQL_WAREHOUSE_ID }}

      - name: Install Databricks SQL CLI
        run: python -m pip install databricks-sql-cli

      - name: Apply RLS and CLS
        run: dbsqlcli -e "source security_policies.sql"
        env:
          DBSQLCLI_HOST_NAME: ${{ secrets.DATABRICKS_HOST }}
          DBSQLCLI_HTTP_PATH: ${{ secrets.SQL_WAREHOUSE_HTTP_PATH }}
          DBSQLCLI_ACCESS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}