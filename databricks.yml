# This is a Databricks asset bundle definition for lab6_mazhara.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: lab7_mazhara
  uuid: a8c93602-7c44-494a-bc58-5135ce33052a

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: dbr_dev
  schema:
    description: mazhara_bronze
  warehouse_id:
    description: "The ID of the SQL Warehouse for dashboards"


resources:
  dashboards:
    mazhara_monitoring:
      name: "Monitoring Dashboard [${bundle.target}]"
      file_path: ./resources/Lab7_mazhara.lvdash.json
      warehouse_id: ${var.warehouse_id}

  pipelines:
    mazhara_pipeline:
      name: "lab7_stream_mazhara_${bundle.target}"
      serverless: false
      clusters:
        - label: "default"
          node_type_id: "Standard_F4"
          num_workers: 1

      notifications:
        - email_recipients: 
            - "mazhara.kirill@softserve.academy"
          alerts:
            - "on-update-failure"
            - "on-update-fatal-failure"

      catalog: ${var.catalog}
      target: ${var.schema}
      libraries:
        - file:
            path: ./src/transformations/eh_to_bronze.py
        - file:
            path: ./src/transformations/bronze_to_silver.py
        - file:
            path: ./src/transformations/silver_to_gold.py



targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${bundle.target.host}
    variables:
      catalog: dbr_dev
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true


  test:
    mode: development
    workspace:
      host: ${bundle.target.host}
    variables:
      catalog: dbr_dev
      schema: ${workspace.current_user.short_name}
    permissions:
      - user_name: mazhara.kirill@softserve.academy
        level: CAN_MANAGE
      - group_name: "users"
        level: CAN_VIEW
